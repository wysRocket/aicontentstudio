name: Deploy to Hostinger

on:
  push:
    branches: [rebuild]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install app dependencies
        run: npm ci

      - name: Build app locally
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build

      - name: Extract expected asset hashes
        run: |
          echo "EXPECTED_CSS_ASSET=$(node -e "const fs=require('fs'); const html=fs.readFileSync('dist/index.html','utf8'); const match=html.match(/href=\"([^\"]+\\.css)\"/); if(!match) process.exit(1); process.stdout.write(match[1]);")" >> "$GITHUB_ENV"
          # JS hash can differ between local and remote builds when build-time env vars differ.
          # Keep JS verification opt-in to avoid false deployment stalls.
          if [ "${VERIFY_JS_ASSET}" = "true" ]; then
            echo "EXPECTED_JS_ASSET=$(node -e "const fs=require('fs'); const html=fs.readFileSync('dist/index.html','utf8'); const match=html.match(/src=\"([^\"]+\\.js)\"/); if(!match) process.exit(1); process.stdout.write(match[1]);")" >> "$GITHUB_ENV"
          fi

      - name: Create source archive
        run: |
          zip -r /tmp/aicontentstudio.zip . \
            --exclude ".git/*" \
            --exclude "node_modules/*" \
            --exclude "dist/*" \
            --exclude ".env*" \
            --exclude "*.log"
          echo "Archive size: $(du -sh /tmp/aicontentstudio.zip | cut -f1)"

      - name: Install deploy script dependencies
        run: |
          mkdir -p /tmp/deploy-deps
          cp .github/scripts/deploy.mjs /tmp/deploy-deps/
          cd /tmp/deploy-deps
          npm init -y
          npm install axios tus-js-client

      - name: Deploy to Hostinger
        working-directory: /tmp/deploy-deps
        env:
          API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          DOMAIN: aicontentstudio.net
          ARCHIVE_PATH: /tmp/aicontentstudio.zip
          EXPECTED_CSS_ASSET: ${{ env.EXPECTED_CSS_ASSET }}
          EXPECTED_JS_ASSET: ${{ env.EXPECTED_JS_ASSET }}
        run: node deploy.mjs
